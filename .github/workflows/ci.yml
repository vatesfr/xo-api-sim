name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run format
      - run: git diff --exit-code
      - run: npm run build
      - run: |
          node dist/index.js &
          sleep 3
          curl --fail http://localhost:3001/ping
          kill %1
